<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Redamancyer</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="./_media/vue.css">
    <link rel="stylesheet" href="./_media/custom.css">
    <link rel="shortcut icon" href="./_media/favicon.ico" type="image/x-icon">
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-40XNNW97M2"></script>
    <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-40XNNW97M2');
    </script>
</head>

<body>
    <div id="app">
        <div class="loader">Loading...</div>
    </div>
    <div id="popup">
        <div class="bg"><img class="out" src="" alt="" /></div>
    </div>
    <script>
    window.$docsify = {
        // logo: '/_media/logo.png',
        name: '<img alt="Redamancyer’s Blog" class="out" src="/_media/logo.png"><div>Redamancyer</div><div class="index">\
                <a href="#/">首页/</a><a href="#/aboutme">关于我</a></div>',
        repo: 'https://github.com/Redamancyer',
        themeColor: '#25798A',
        topMargin: 30,
        notFoundPage: true,
        search: [
            '/', // => /README.md
        ],
        auto2top: true,
        formatUpdated: '{YYYY}/{MM}/{DD} {HH}:{mm}',
        plugins: [
            function(hook, vm) {
                hook.beforeEach(function(html) {
                    return  html + '> Last Modified {docsify-updated}' 
                })
            }
        ],
        markdown: {
            smartypants: true,
            renderer: {
                image: function(url) {
                    return '<div class="center"><img src="' + url + '" data-origin="' + url + '" alt="image"></div>'
                }
            }
        },
        count: {
            countable: true,
            fontsize: '0.9em',
            color: 'rgb(90,90,90)',
            language: 'chinese'
        }
    }
    </script>
    <!-- Docsify v4 -->
    <script src="./_media/docsify@4.js"></script>
    <script src="./_media/search.min.js"></script>
    <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
</body>

</html>
